name: Lint PR Title
description: Validate that the PR title follows the Conventional Commits specification.

inputs:
  github-token:
    description: 'GitHub token'
    required: false
    default: ${{ github.token }}

runs:
  using: composite
  steps:
    - uses: amannn/action-semantic-pull-request@v6
      env:
        GITHUB_TOKEN: ${{ inputs.github-token }}
